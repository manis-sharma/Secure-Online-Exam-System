<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1976d2" />
    <meta name="description" content="Secure Online School Examination System" />
    
    <!-- Prevent caching for security -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>Online Exam System</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this application.</noscript>
    <div id="root"></div>
    
    <!-- Disable right-click globally as additional security layer -->
    <script>
      // Prevent right-click
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
      });
      
      // Prevent keyboard shortcuts for developer tools
      document.addEventListener('keydown', function(e) {
        // F12
        if (e.keyCode === 123) {
          e.preventDefault();
          return false;
        }
        // Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C
        if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
          e.preventDefault();
          return false;
        }
        // Ctrl+U (View Source)
        if (e.ctrlKey && e.keyCode === 85) {
          e.preventDefault();
          return false;
        }
      });
      
      // Detect DevTools
      (function() {
        const devtools = {
          isOpen: false,
          orientation: undefined
        };
        
        const threshold = 160;
        
        const emitEvent = (isOpen, orientation) => {
          window.dispatchEvent(new CustomEvent('devtoolschange', {
            detail: { isOpen, orientation }
          }));
        };
        
        setInterval(() => {
          const widthThreshold = window.outerWidth - window.innerWidth > threshold;
          const heightThreshold = window.outerHeight - window.innerHeight > threshold;
          const orientation = widthThreshold ? 'vertical' : 'horizontal';
          
          if (!(heightThreshold && widthThreshold) &&
              ((window.Firebug && window.Firebug.chrome && window.Firebug.chrome.isInitialized) ||
               widthThreshold || heightThreshold)) {
            if (!devtools.isOpen || devtools.orientation !== orientation) {
              emitEvent(true, orientation);
            }
            devtools.isOpen = true;
            devtools.orientation = orientation;
          } else {
            if (devtools.isOpen) {
              emitEvent(false, undefined);
            }
            devtools.isOpen = false;
            devtools.orientation = undefined;
          }
        }, 500);
      })();
    </script>
  </body>
</html>
